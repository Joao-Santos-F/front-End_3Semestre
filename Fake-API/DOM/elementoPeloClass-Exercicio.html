<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegar elemento pela class</title>

    <style>

        .corsim{
            color: red;
        }

        .cornao{
            color: darkgray;
        }

        select option.corsim{
            color: red;
        }

    </style>

</head>
<body>

    <input type="text" id="fruta" placeholder="digite o nome da fruta">

    <select name="" id="nomeClasse">
        <option value="">Selecione</option>
        <option value="corsim" class="corsim">CorSim</option>
        <option value="cornao" class="cornao">CorNão</option>
    </select>

    <button onclick="cadastrarFruta()">Cadastrar fruta  </button>

    <h1>Frutas</h1>

    <ul id="listaFrutas">
        <li class="corsim">Amora</li>
    </ul>

    <script>
        function cadastrarFruta() {
            //entrada de dados
            const fruta = document.getElementById("fruta").value;
            const nomeClasse = document.getElementById("nomeClasse").value;
            const listaFrutas = document.getElementById("listaFrutas");

            //valida se preencheu o campo ou não
            if (fruta.trim().lenght == 0 || nomeClasse.lenght ==0) {
                alert("Preencha todos os campos: fruta e nome da classe")
                return false;
            }

            //cadastra um item no final da lista
            //mantendo os itens anteriores
            listaFrutas.innerHTML += `<li class="${nomeClasse}">${fruta}</li>`

        }
    </script>

</body>
</html>
