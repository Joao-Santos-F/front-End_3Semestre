<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegar elemento pelo id</title>
</head>

<body>

    <input type="text" id="nome">
    <input type="text" id="sobrenome">
    <button onclick="juntarNome()">Nome e Sobrenome</button>

<script>

    function juntarNome() {
        const nome = document.getElementById("nome")
        alert(nome.value)

        

        const sobrenome = document.getElementById("sobrenome")
        alert(sobrenome.value)
    }
</script>
</body>

</html>
