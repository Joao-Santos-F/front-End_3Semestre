<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com Caixinhas em CSS</title>
    <link rel="stylesheet" href="./caixinhas.css">
</head>
<body>
    <!--section>article{conteudo$}*3-->
    <section class="mamae">
        <article class="mamae__filhinho">conteudo 1</article>
        <article class="mamae__filhinho filhinho--azul">conteudo 3</article>
        <article class="mamae__filhinho">conteudo 2</article>
    </section>

    <nav class="menu">
        <a href="#" class="menu__item">Link 1</a>
        <a href="#" class="menu__item">Link 2</a>
        <a href="#" class="menu__item state--active">Link 3</a>
    </nav>
    
</body>
</html>
