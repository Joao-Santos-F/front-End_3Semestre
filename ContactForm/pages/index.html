<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <header class="header">
        <div class="container container--flex-column">
            <img class="header__logo" src="../images/Vector.svg" alt="Logotipo do ContactForm">
            <h1 class="header__title">Contact Form</h1>
            <p class="header__text">Insira o dados do contato e clique em cadastrar</p>
        </div>
    </header>

    <main>
        <div class="container">

            <form class="contact-form" action="">

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--metade" name="nome" id="nome" placeholder="Digite seu nome" type="text">
                        <input class="contact-form__input contact-form__input--metade" name="sobrenome" id="sobrenome" placeholder="Digite seu sobrenome" type="text">
                    </div>

                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="email">Email</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--tamanho" name="email" id="email" placeholder="Digite seu email" type="email">
                    </div>

                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="telefone">Telefone</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--tres-metades" name="telefone" id="numinter" placeholder="+55" type="tel">
                        <input class="contact-form__input contact-form__input--tres-metades3" name="telefone" id="ddd" placeholder="DDD" type="tel">
                        <input class="contact-form__input contact-form__input--tres-metades" name="telefone" id="telefone" placeholder="Ex: 99999-9999" type="tel">
                    </div>

                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a--endereco">
                        <label class="contact-form__label" for="endereco">Endereco</label>
                    </div>

                    <div class="contact-form__col-c">
                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco" id="cep" placeholder="CEP: 00000-000" type="text">
                        <input class="contact-form__input contact-form__input--metade2" name="endereco" id="endereco" placeholder="Rua Lá de Casa" type="text">
                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco" id="numero" placeholder="Ex: 555" type="text">

                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco" id="complemento" placeholder="Apto: 12 Bloco X" type="text">
                        <input class="contact-form__input contact-form__input--tres-metades3" name="endereco" id="bairro" placeholder="Bairro" type="text">
                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco" id="cidade" placeholder="Cidade" type="text">

                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco" id="estado" placeholder="Estado" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="anotacoes">Anotações</label>
                    </div>

                    <div class="contact-form__col-b">
                        <textarea class="contact-form__input contact-form__input--tamanho3" name="anotacoes" id="anotacoes" placeholder="Digite suas anotações"></textarea>
                    </div>

                </div>      

                <article class="contact-button">
                    <button class="contact-button__cadastro contact-form__input" type="button" id="cadastrar" name="cadastrar" onclick="VerificarCampos();">Cadastrar</button>
                    <button class="contact-button__limpar contact-form__input" type="reset" id="limpar" name="limpar" onclick="">Limpar</button>
                </article>

            </form>

        </div>

    </main>
    
    <script>
        function VerificarCampos() {
            let nome = document.getElementById("nome").value.trim();
            let sobrenome = document.getElementById("sobrenome").value.trim();
            let email = document.getElementById("email").value.trim();
            let numinter = document.getElementById("numinter").value.trim();
            let telefone = document.getElementById("telefone").value.trim();
            let ddd = document.getElementById("ddd").value.trim();
            let cep = document.getElementById("cep").value.trim();
            let endereco = document.getElementById("endereco").value.trim();
            let numero = document.getElementById("numero").value.trim();
            let complemento = document.getElementById("complemento").value.trim();
            let bairro = document.getElementById("bairro").value.trim();
            let cidade = document.getElementById("cidade").value.trim();
            let estado = document.getElementById("estado").value.trim();
            let anotacoes = document.getElementById("anotacoes").value.trim();

            if (nome.length == 0) {
                FormError("nome");
            } else {
                FormSuccess("nome");
            }

            if (sobrenome.length == 0) {
                FormError("sobrenome");
            } else {
                FormSuccess("sobrenome");
            }

            if (email.length == 0) {
                FormError("email");
            } else {
                FormSuccess("email");
            }

            if (numinter.length == 0) {
                FormError("numinter");
            } else {
                FormSuccess("numinter");
            }

            if (ddd.length == 0) {
                FormError("ddd");
            } else {
                FormSuccess("ddd");
            }

             if (telefone.length == 0) {
                FormError("telefone");
            } else {
                FormSuccess("telefone");
            }

             if (cep.length == 0) {
                FormError("cep");
            } else {
                FormSuccess("cep");
            }

             if (endereco.length == 0) {
                FormError("endereco");
            } else {
                FormSuccess("endereco");
            }

             if (numero.length == 0) {
                FormError("numero");
            } else {
                FormSuccess("numero");
            }

             if (complemento.length == 0) {
                FormError("complemento");
            } else {
                FormSuccess("complemento");
            }

             if (bairro.length == 0) {
                FormError("bairro");
            } else {
                FormSuccess("bairro");
            }

             if (cidade.length == 0) {
                FormError("cidade");
            } else {
                FormSuccess("cidade");
            }

             if (estado.length == 0) {
                FormError("estado");
            } else {
                FormSuccess("estado");
            }

            //funcao que pinta a borda que falta preencher
            function FormError(fildId){
                document.getElementById(fildId).style.border = "1px solid red";
            }

            //funcao que reinicia a borda do campo preenchido
            function FormSuccess(fildId){
                document.getElementById(fildId).style.border = "none";
            }

            console.log(`
            nome: ${nome} ${sobrenome} | 
            email: ${email} | 
            telefone: +${numinter} ${ddd} ${telefone} | 
            CEP: ${cep} |
            Endereço: ${endereco} |
            Número: ${numero} |
            Complemento: ${complemento} |
            Bairro: ${bairro} |
            Cidade: ${cidade} |
            Estado: ${estado} |
            Anotações: ${anotacoes} |
            `);
        }
    </script>
    
</body>

</html>
